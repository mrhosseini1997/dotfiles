# ============================================================
# Terminal & colors
# ============================================================
set -g default-terminal "${TERM}"
set -as terminal-overrides ',xterm*:Tc:sitm=\E[3m'

# Extended keys (Shift+Enter, Ctrl+Enter, etc. via Ghostty)
set -g extended-keys always
set -g extended-keys-format csi-u
set -as terminal-features ',xterm-ghostty:extkeys'

# Undercurl + colored undercurl
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# ============================================================
# General
# ============================================================
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g history-limit 20000
set -g escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set-option -g focus-events on
set-option -g set-titles on
set -g set-clipboard on

# Mouse + vi-mode
setw -g mouse on
setw -g mode-keys vi
set -g status-keys vi

# Auto-rename windows to the running command
set-window-option -g automatic-rename on

# Constrain to the *window* size, not the session
setw -g aggressive-resize on

# Quieter
setw -g monitor-activity off
set -g visual-activity off

# ============================================================
# Key bindings
# ============================================================
# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Splits — keep CWD
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window — keep CWD
unbind c
bind c new-window -c "#{pane_current_path}"

# Vi-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Cycle windows
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Resize panes
bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10

# lazygit popup
bind-key g display-popup -w "80%" -h "80%" -d "#{pane_current_path}" -E "lazygit"

# Vim-style copy mode
unbind [
bind Escape copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
